apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: genuvia-service-template
  title: Create a New Genuvia Service
  description: Scaffolds a new FastAPI service with Kubernetes manifests, CI/CD, and catalog registration
  tags:
    - python
    - fastapi
    - kubernetes
spec:
  owner: user:ntando-miya
  type: service

  parameters:
    - title: Service Details
      required:
        - name
        - description
      properties:
        name:
          title: Service Name
          type: string
          description: Name of the new service (e.g. genuvia-signals)
        description:
          title: Description
          type: string
          description: What does this service do?
        owner:
          title: Owner
          type: string
          default: ntando-miya

    - title: Choose a Repository Location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        token: ${{ secrets.USER_OAUTH_TOKEN }}

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        entityRef: ${{ steps['register'].output.entityRef }}
